name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: autopazar
          POSTGRES_USER: autopazar
          POSTGRES_PASSWORD: autopazar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autopazar -d autopazar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost
      DATABASE_URL: postgres://autopazar:autopazar@localhost:5432/autopazar
      REDIS_URL: redis://localhost:6379/0
      CELERY_TASK_ALWAYS_EAGER: "True"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python dependencies
        run: pip install -r requirements/dev.txt
      - name: Install Node dependencies
        run: npm install
      - name: Build CSS
        run: npm run build:css
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Lint
        run: |
          black --check .
          isort --check-only .
          flake8 .
      - name: Test
        run: pytest

