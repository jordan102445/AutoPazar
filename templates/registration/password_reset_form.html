{% extends "base.html" %}

{% block title %}Ресетирај лозинка | AutoPazar{% endblock title %}

{% block content %}
  <section class="mx-auto max-w-md rounded-[32px] border border-slate-200 bg-white p-8 shadow-sm">
    <h1 class="text-3xl font-black tracking-tight text-slate-950">Ресетирај лозинка</h1>
    <form method="post" class="mt-6 space-y-5">
      {% csrf_token %}
      {% for field in form %}
        {% include "includes/form_field.html" with field=field %}
      {% endfor %}
      <button type="submit" class="w-full rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white">Испрати линк</button>
    </form>
  </section>
{% endblock content %}
