{% if messages %}
  <div class="mx-auto mt-6 max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="space-y-3">
      {% for message in messages %}
        <div class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm {{ message.tags }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  </div>
{% endif %}
