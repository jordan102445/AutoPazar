{% load querystring %}
{% if page_obj.has_other_pages %}
  <nav class="mt-8 flex items-center justify-center gap-2">
    {% if page_obj.has_previous %}
      <a href="?{% query_transform page=page_obj.previous_page_number %}" class="rounded-full border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700">Претходна</a>
    {% endif %}
    <span class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white">
      {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}
    </span>
    {% if page_obj.has_next %}
      <a href="?{% query_transform page=page_obj.next_page_number %}" class="rounded-full border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700">Следна</a>
    {% endif %}
  </nav>
{% endif %}
