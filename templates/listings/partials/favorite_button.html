{% if request.user.is_authenticated %}
  <button
    type="button"
    class="rounded-full border px-4 py-2 text-sm font-semibold transition {% if is_favorite %}border-amber-400 bg-amber-50 text-amber-700{% else %}border-slate-300 text-slate-700 hover:border-slate-900 hover:text-slate-900{% endif %}"
    hx-post="{% url 'favorites:toggle' listing.slug %}"
    hx-target="this"
    hx-swap="outerHTML"
  >
    {% if is_favorite %}Тргни од омилени{% else %}Додај во омилени{% endif %}
  </button>
{% else %}
  <a href="{% url 'users:login' %}" class="rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-900 hover:text-slate-900">
    Најава за омилени
  </a>
{% endif %}
