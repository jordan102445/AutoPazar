{% extends "base.html" %}

{% block title %}Регистрација | AutoPazar{% endblock title %}

{% block content %}
  <section class="mx-auto max-w-2xl rounded-[32px] border border-slate-200 bg-white p-8 shadow-sm">
    <p class="text-sm font-bold uppercase tracking-[0.2em] text-slate-500">Регистрација</p>
    <h1 class="mt-2 text-3xl font-black tracking-tight text-slate-950">Креирај профил за продажба</h1>
    <form method="post" class="mt-8 grid gap-6 md:grid-cols-2">
      {% csrf_token %}
      {% for field in form %}
        <div class="{% if field.name == 'password1' or field.name == 'password2' %}md:col-span-2{% endif %}">
          {% include "includes/form_field.html" with field=field %}
        </div>
      {% endfor %}
      <div class="md:col-span-2">
        <button type="submit" class="w-full rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white">Креирај профил</button>
      </div>
    </form>
  </section>
{% endblock content %}
