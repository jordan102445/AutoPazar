version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autopazar}
      POSTGRES_USER: ${POSTGRES_USER:-autopazar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autopazar}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autopazar} -d ${POSTGRES_DB:-autopazar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-autopazar}:${POSTGRES_PASSWORD:-autopazar}@postgres:5432/${POSTGRES_DB:-autopazar}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /app/docker/entrypoint.sh gunicorn config.wsgi:application -c docker/gunicorn/gunicorn.conf.py
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    expose:
      - "8000"

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-autopazar}:${POSTGRES_PASSWORD:-autopazar}@postgres:5432/${POSTGRES_DB:-autopazar}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info
    volumes:
      - media_data:/app/media

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
